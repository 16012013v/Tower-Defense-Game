<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense: Pro Edition</title>
    <style>
        /* Загальні налаштування */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1b 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Картка контенту */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 60px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        /* Заголовок */
        h1 {
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(to right, #00c853, #b2ff59);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0, 200, 83, 0.3);
        }

        p {
            font-size: 1.2rem;
            color: #8a8a8a;
            margin-bottom: 40px;
        }

        /* Крута кнопка */
        .download-btn {
            position: relative;
            display: inline-block;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            background: #00c853;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 200, 83, 0.4);
        }

        .download-btn:hover {
            background: #00e676;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 0 40px rgba(0, 230, 118, 0.6);
        }

        /* Декор */
        .version {
            margin-top: 20px;
            display: block;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TOWER DEFENSE</h1>
        <p>Professional Edition • Захисти свою базу</p>
        
        <a href="https://drive.google.com/file/d/1IHmiNjUE1mQBVkTyJvcn1zd34LHRKEmW/view?usp=sharing" class="download-btn">DOWNLOAD NOW</a>
        
        <span class="version">v1.0.0 Stable | Windows PC</span>
    </div>

</body>
</html>
